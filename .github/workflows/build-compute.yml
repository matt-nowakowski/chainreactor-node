name: Build Compute Marketplace

on:
  push:
    branches:
      - feat/compute-marketplace

concurrency:
  group: build-compute-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-compute-node:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev git clang libclang-dev protobuf-compiler

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-compute-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-compute-

      - name: Build compute node binary
        run: cargo build --release --locked --features "compute-marketplace"
        env:
          CARGO_INCREMENTAL: 0

      - name: Rename binary
        run: |
          cp target/release/cr-node target/release/cr-node-compute-linux-amd64
          chmod +x target/release/cr-node-compute-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cr-node-compute-linux-amd64
          path: target/release/cr-node-compute-linux-amd64

  build-compute-daemon:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            compute-daemon/target
          key: ${{ runner.os }}-cargo-compute-daemon-${{ hashFiles('compute-daemon/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-compute-daemon-

      - name: Build cr-compute daemon
        run: cd compute-daemon && cargo build --release --locked
        env:
          CARGO_INCREMENTAL: 0

      - name: Rename binary
        run: |
          cp compute-daemon/target/release/cr-compute compute-daemon/target/release/cr-compute-linux-amd64
          chmod +x compute-daemon/target/release/cr-compute-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cr-compute-linux-amd64
          path: compute-daemon/target/release/cr-compute-linux-amd64

  release:
    needs: [build-compute-node, build-compute-daemon]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest compute tag and bump
        id: version
        run: |
          LATEST=$(git tag --sort=-v:refname --list 'v*-compute' | head -1)
          echo "Latest compute tag: $LATEST"
          if [ -z "$LATEST" ]; then
            NEW_TAG="v1.19.11-compute"
          else
            VERSION=$(echo "$LATEST" | sed 's/-compute//')
            MAJOR=$(echo "$VERSION" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$VERSION" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$VERSION" | sed 's/v//' | cut -d. -f3)
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))-compute"
          fi
          echo "New tag: $NEW_TAG"
          echo "NEW_TAG=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.NEW_TAG }}
          git push origin ${{ steps.version.outputs.NEW_TAG }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.NEW_TAG }}
          name: "Compute Marketplace - ${{ steps.version.outputs.NEW_TAG }}"
          body: |
            Compute marketplace R&D release from `feat/compute-marketplace` branch.

            **This is NOT a production release.** Do not use these binaries for mainline deployments.

            Includes:
            - `cr-node-compute-linux-amd64` — node with `compute-marketplace` pallet
            - `cr-compute-linux-amd64` — standalone compute daemon
          files: |
            cr-node-compute-linux-amd64/cr-node-compute-linux-amd64
            cr-compute-linux-amd64/cr-compute-linux-amd64
          generate_release_notes: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
