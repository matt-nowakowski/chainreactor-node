name: Build Compute Marketplace Binary

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.19.8-compute)'
        required: true
        type: string
  push:
    tags:
      - 'v*-compute*'

concurrency:
  group: build-compute-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev git clang libclang-dev protobuf-compiler

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-compute-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-compute-

      - name: Build compute marketplace release binary
        run: cargo build --release --locked --features compute-marketplace
        env:
          CARGO_INCREMENTAL: 0

      - name: Rename binary
        run: |
          cp target/release/cr-node target/release/cr-node-compute-linux-amd64
          chmod +x target/release/cr-node-compute-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cr-node-compute-linux-amd64
          path: target/release/cr-node-compute-linux-amd64

  release:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: "Compute Marketplace - ${{ inputs.tag || github.ref_name }}"
          files: |
            cr-node-compute-linux-amd64/cr-node-compute-linux-amd64
          body: |
            Compute marketplace demo binary. Built from `feat/compute-marketplace` branch with `--features compute-marketplace`.

            This is a separate binary for the decentralized compute marketplace demo. It does NOT affect production deployments.
            Production binaries (`cr-node-base`, `cr-node-pm`, `cr-node-worker`) are released separately from `main`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
